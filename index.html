<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Blast</title>
</head>

<body>
  <div id="app">
    <!-- Phaser canvas parent; Phaser will insert a canvas here -->
    <div id="game-canvas"></div>
    <!-- HTML UI overlay -->
    <div id="ui-layer">
      <div id="ui-container">
        <!-- 主页 -->
        <div id="home-screen">
          <h1>Energy Blast</h1>
          <p id="connection-status" style="margin:8px 0; color:#888; font-size:14px;">连接中...</p>
          <button id="start-game-btn" class="interactive">进入房间</button>
        </div>

        <!-- 房间 -->
        <div id="lobby-screen" class="hidden">
          <h2>游戏房间</h2>
          <div class="player-list-container">
            <ul id="player-list"></ul>
          </div>
          <div class="lobby-actions">
            <button id="ready-btn" class="interactive">准备</button>
            <button id="share-link-btn" class="interactive">分享链接</button>
          </div>
          <p id="lobby-status">等待所有玩家准备...</p>
        </div>
      </div>

      <!-- 名字输入弹窗（替代浏览器 prompt） -->
      <div id="name-modal" class="interactive hidden"
        style="position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; align-items: center; justify-content: center;">
        <div
          style="background:#fff; color:#333; padding:16px; border-radius:8px; width: 300px; box-shadow: 0 6px 24px rgba(0,0,0,.25);">
          <h3 style="margin: 0 0 10px 0; font-size: 18px;">请输入名字</h3>
          <input id="player-name-input" type="text" placeholder="你的名字"
            style="width:100%; padding:8px 10px; margin-bottom:12px; border:1px solid #ddd; border-radius:6px; outline:none;">
          <div style="display:flex; justify-content:flex-end; gap:8px;">
            <button id="name-cancel-btn" class="interactive" style="background:#eee; color:#333;">取消</button>
            <button id="name-confirm-btn" class="interactive" style="background:#27ae60;">确定</button>
          </div>
        </div>
      </div>

      <!-- 全局确认弹窗（替代 confirm） -->
      <div id="confirm-modal" class="interactive hidden"
        style="position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; align-items: center; justify-content: center;">
        <div
          style="background:#fff; color:#333; padding:16px; border-radius:8px; width: 320px; box-shadow: 0 6px 24px rgba(0,0,0,.25);">
          <div id="confirm-message" style="margin: 0 0 16px 0; font-size: 16px; line-height:1.4;"></div>
          <div style="display:flex; justify-content:flex-end; gap:8px;">
            <button id="confirm-cancel-btn" class="interactive" style="background:#eee; color:#333;">取消</button>
            <button id="confirm-ok-btn" class="interactive" style="background:#e74c3c;">确定</button>
          </div>
        </div>
      </div>

      <!-- 轻提示（替代 alert） -->
      <div id="toast" class="hidden"
        style="position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); background: rgba(0,0,0,.85); color: #fff; padding: 10px 14px; border-radius: 20px; z-index: 1000; font-size: 14px; box-shadow: 0 4px 16px rgba(0,0,0,.25);">
      </div>

      <!-- In-game Action Bar (visible during gameplay) -->
      <div id="action-bar" class="interactive hidden"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
