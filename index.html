<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Blast</title>
</head>

<body class="app-loading">
  <div id="app">
    <div id="app-loading-screen" aria-live="polite"
      style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:#f8f8f8;z-index:2000;">
      <div class="loading-card"
        style="width:min(100%,360px);padding:28px 24px;text-align:center;background:#fff;border:3px solid #222;border-radius:18px 26px 14px 24px;box-shadow:8px 8px 0 #222;">
        <h1>Energy Blast</h1>
        <p>加载战斗场景与房间状态...</p>
      </div>
    </div>
    <!-- Phaser canvas parent; Phaser will insert a canvas here -->
    <div id="game-canvas"></div>
    <!-- HTML UI overlay -->
    <div id="ui-layer" hidden>
      <div id="ui-container">
        <!-- 主页 -->
        <div id="home-screen">
          <h1>Energy Blast</h1>
          <p id="connection-status" style="margin:8px 0; color:#888; font-size:14px;">连接中...</p>
          <div class="home-actions">
            <button id="start-game-btn" class="interactive">创建房间</button>
            <button id="join-room-toggle-btn" class="interactive">加入房间</button>
          </div>
          <div id="join-room-form" class="hidden join-room-form">
            <input id="join-room-input" type="text" placeholder="输入房间 ID" maxlength="24" />
            <button id="join-room-confirm-btn" class="interactive">确认加入</button>
          </div>
        </div>

        <!-- 房间 -->
        <div id="lobby-screen" class="hidden">
          <h2>游戏房间</h2>
          <div id="room-meta" class="room-meta hidden">
            <div id="room-id-display"></div>
            <div id="room-link-display"></div>
          </div>
          <div id="lobby-match-settings" class="room-meta hidden">
            <div class="match-settings-row">
              <label for="lobby-auto-resolve-select">结算模式</label>
              <select id="lobby-auto-resolve-select">
                <option value="auto">自动结算</option>
                <option value="manual">手动结算</option>
              </select>
            </div>
            <div class="match-settings-row">
              <label for="lobby-round-time-input">自动倒计时</label>
              <div class="match-settings-inline">
                <input id="lobby-round-time-input" type="number" min="2" max="30" step="1" value="5" />
                <span>秒</span>
              </div>
            </div>
            <p id="lobby-match-settings-hint" class="match-settings-hint">房主可在开始游戏前配置联机结算方式。</p>
          </div>
          <div class="player-list-container">
            <ul id="player-list"></ul>
          </div>
          <div class="lobby-actions">
            <button id="ready-btn" class="interactive">准备</button>
            <button id="share-link-btn" class="interactive">分享链接</button>
          </div>
          <p id="lobby-status">等待所有玩家准备...</p>
        </div>
      </div>

      <!-- 名字输入弹窗（替代浏览器 prompt） -->
      <div id="name-modal" class="interactive hidden"
        style="position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; align-items: center; justify-content: center;">
        <div
          style="background:#fff; color:#333; padding:16px; border-radius:8px; width: 300px; box-shadow: 0 6px 24px rgba(0,0,0,.25);">
          <h3 style="margin: 0 0 10px 0; font-size: 18px;">请输入名字</h3>
          <input id="player-name-input" type="text" placeholder="你的名字"
            style="width:100%; padding:8px 10px; margin-bottom:12px; border:1px solid #ddd; border-radius:6px; outline:none;">
          <div style="display:flex; justify-content:flex-end; gap:8px;">
            <button id="name-cancel-btn" class="interactive" style="background:#eee; color:#333;">取消</button>
            <button id="name-confirm-btn" class="interactive" style="background:#27ae60;">确定</button>
          </div>
        </div>
      </div>

      <!-- 全局确认弹窗（替代 confirm） -->
      <div id="confirm-modal" class="interactive hidden"
        style="position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; align-items: center; justify-content: center;">
        <div
          style="background:#fff; color:#333; padding:16px; border-radius:8px; width: 320px; box-shadow: 0 6px 24px rgba(0,0,0,.25);">
          <div id="confirm-message" style="margin: 0 0 16px 0; font-size: 16px; line-height:1.4;"></div>
          <div style="display:flex; justify-content:flex-end; gap:8px;">
            <button id="confirm-cancel-btn" class="interactive" style="background:#eee; color:#333;">取消</button>
            <button id="confirm-ok-btn" class="interactive" style="background:#e74c3c;">确定</button>
          </div>
        </div>
      </div>

      <!-- 轻提示（替代 alert） -->
      <div id="toast" class="hidden"
        style="position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); background: rgba(0,0,0,.85); color: #fff; padding: 10px 14px; border-radius: 20px; z-index: 1000; font-size: 14px; box-shadow: 0 4px 16px rgba(0,0,0,.25);">
      </div>

      <!-- In-game Action Bar (visible during gameplay) -->
      <div id="action-bar" class="interactive hidden"></div>

      <!-- Debug Panel (hidden by default; open via console: toggleDebugPanel()) -->
      <div id="debug-panel" class="interactive"
        style="display:none; position: fixed; right: 12px; top: 12px; z-index: 1100; background: #fff; color: #333; border: 2px solid #000; border-radius: 10px; padding: 10px 12px; box-shadow: 4px 4px 0 #000; min-width: 200px;">
        <div id="debug-panel-header" style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
          <strong style="font-size:14px;">Debug 控制台</strong>
          <button id="debug-collapse-btn" class="interactive" style="margin:0; padding:2px 8px;">收起</button>
        </div>
        <div id="debug-panel-body">
          <div style="font-size:12px; color:#666; margin-bottom:4px;">控制台输入 toggleDebugPanel() 打开或关闭</div>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button id="debug-refresh-btn" class="interactive"
              style="margin:0; background:#3498db; color:#fff; flex:1;">刷新面板</button>
          </div>

          <div style="margin-top:8px; border-top:1px solid #ddd; padding-top:8px;">
            <div style="font-size:12px; font-weight:bold; margin-bottom:6px;">玩家数据（可直接编辑）</div>
            <div id="debug-player-editor"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
