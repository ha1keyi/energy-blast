<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Blast</title>
</head>

<body>
  <div id="app">
    <!-- Phaser canvas parent; Phaser will insert a canvas here -->
    <div id="game-canvas"></div>
    <!-- HTML UI overlay -->
    <div id="ui-layer">
      <div id="ui-container">
        <!-- 主页 -->
        <div id="home-screen">
          <h1>Energy Blast</h1>
          <button id="start-game-btn" class="interactive">进入房间</button>
        </div>

        <!-- 房间 -->
        <div id="lobby-screen" class="hidden">
          <h2>游戏房间</h2>
          <div class="player-list-container">
            <ul id="player-list"></ul>
          </div>
          <div class="lobby-actions">
            <button id="ready-btn" class="interactive">准备</button>
            <button id="share-link-btn" class="interactive">分享链接</button>
          </div>
          <p id="lobby-status">等待所有玩家准备...</p>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
